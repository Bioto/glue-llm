# Pytest is configured here only (not in pyproject.toml) to avoid duplicate sources of truth.
# CodeRabbit "docstring coverage" thresholds are enforced in CI/CodeRabbit settings, not pytest.
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    rate_limit: marks tests as rate limiting tests (skipped by default, run with --collect-only or target the file directly)
    benchmark: live API benchmark tests (excluded from default run via addopts — use pytest -m benchmark). CPU-only harnesses live in test_local_micro_benchmarks.py.
addopts =
    -v
    --tb=short
    --strict-markers
    --ignore=tests/test_rate_limiting.py
    -n auto
    -m "not benchmark"
filterwarnings =
    ignore::DeprecationWarning:any_llm.*
    ignore:There is no current event loop:DeprecationWarning
    ignore:Provider-specific exceptions will be converted:DeprecationWarning
